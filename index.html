<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Tap</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: space-between;
      transition: background-color 0.15s ease;
    }

    #buttons {
      display: flex;
      justify-content: space-around;
      padding: 30px 20px 40px;
    }

    button {
      flex: 1;
      margin: 0 10px;
      padding: 35px 10px;
      font-size: 28px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div></div>

  <div id="buttons"></div>

  <script>
    const colors = [
      { name: "Red", value: "#ff3b30" },
      { name: "Blue", value: "#007aff" },
      { name: "Green", value: "#34c759" },
      { name: "Yellow", value: "#fff176" }, // lighter yellow
      { name: "Purple", value: "#af52de" },
      { name: "Orange", value: "#ff9500" }
    ];

    const buttonContainer = document.getElementById("buttons");

    let currentColor;

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);

      // slower + friendlier
      utterance.rate = 0.75;
      utterance.pitch = 1.2;

      // try to use a nicer voice if available
      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.toLowerCase().includes("female") ||
        v.name.toLowerCase().includes("samantha")
      );

      if (preferred) {
        utterance.voice = preferred;
      }

      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    function playBoop() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(550, ctx.currentTime);

      gain.gain.setValueAtTime(0.2, ctx.currentTime);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + 0.12);
    }

    function getRandomColors(count) {
      return [...colors].sort(() => 0.5 - Math.random()).slice(0, count);
    }

    function nextRound() {
      currentColor = colors[Math.floor(Math.random() * colors.length)];

      document.body.style.backgroundColor = currentColor.value;

      const choices = getRandomColors(3);

      if (!choices.find(c => c.name === currentColor.name)) {
        choices[Math.floor(Math.random() * choices.length)] = currentColor;
      }

      buttonContainer.innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice.name;

        btn.onclick = () => {
          playBoop();
          speak(choice.name);

          setTimeout(nextRound, 150); // slightly faster flow
        };

        buttonContainer.appendChild(btn);
      });
    }

    // Fix for voice loading on some devices
    speechSynthesis.onvoiceschanged = () => {};

    nextRound();
  </script>

</body>
</html>
