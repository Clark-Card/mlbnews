<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Tap</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: space-between;
      transition: background-color 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    #buttons {
      display: flex;
      justify-content: space-around;
      padding: 30px 20px 10px;
      z-index: 1;
    }

    button {
      flex: 1;
      margin: 0 10px;
      padding: 35px 10px;
      font-size: 28px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.05s ease, background-color 0.1s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    #streak {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      padding-bottom: 20px;
      opacity: 0.7;
      z-index: 1;
    }

    .correct {
      background-color: #d4ffd4 !important;
    }

    .wrong {
      background-color: #ffd6d6 !important;
    }

    /* FULL SCREEN X */
    #wrongFlash {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 300px;
      font-weight: 900;
      color: rgba(255, 0, 0, 0.85);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div></div>

  <div id="buttons"></div>

  <div id="streak">0</div>

  <div id="wrongFlash">✕</div>

  <script>
    const colors = [
      { name: "Red", value: "#ff3b30" },
      { name: "Blue", value: "#007aff" },
      { name: "Green", value: "#34c759" },
      { name: "Yellow", value: "#fff176" },
      { name: "Purple", value: "#af52de" },
      { name: "Orange", value: "#ff9500" },
      { name: "Brown", value: "#8B4513" },
      { name: "Pink", value: "#ff9ecb" },
      { name: "Black", value: "#2c2c2c" },
      { name: "Gray", value: "#8e8e93" },
      { name: "White", value: "#f2f2f2" }
    ];

    const buttonContainer = document.getElementById("buttons");
    const streakDisplay = document.getElementById("streak");
    const wrongFlash = document.getElementById("wrongFlash");

    let currentColor;
    let streak = 0;

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.65;
      utterance.pitch = 1.15;

      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.toLowerCase().includes("female") ||
        v.name.toLowerCase().includes("samantha")
      );

      if (preferred) utterance.voice = preferred;

      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    function playBoop() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(550, ctx.currentTime);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + 0.12);
    }

    function flashWrong() {
      wrongFlash.style.opacity = 1;
      setTimeout(() => {
        wrongFlash.style.opacity = 0;
      }, 100);
    }

    function getRandomColors(count) {
      return [...colors].sort(() => 0.5 - Math.random()).slice(0, count);
    }

    function nextRound() {
      currentColor = colors[Math.floor(Math.random() * colors.length)];
      document.body.style.backgroundColor = currentColor.value;

      const choices = getRandomColors(3);

      if (!choices.find(c => c.name === currentColor.name)) {
        choices[Math.floor(Math.random() * choices.length)] = currentColor;
      }

      buttonContainer.innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice.name;

        btn.onclick = () => {
          playBoop();

          if (choice.name === currentColor.name) {
            streak++;
            btn.classList.add("correct");
            speak(choice.name);
          } else {
            streak = 0;
            btn.classList.add("wrong");
            flashWrong();
            speak(currentColor.name); // correct answer spoken
          }

          streakDisplay.innerText = streak;

          setTimeout(nextRound, 150);
        };

        buttonContainer.appendChild(btn);
      });
    }

    speechSynthesis.onvoiceschanged = () => {};

    nextRound();
  </script>

</body>
</html>
